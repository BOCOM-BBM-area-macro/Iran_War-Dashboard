name: Update News Dashboard

on:
  schedule:
  - cron: '0 10 * * *'
  workflow_dispatch:      # Allows you to run it manually

permissions:
  contents: write

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-22.04 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pygooglenews and Dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. Install modern versions of what pygooglenews needs
          pip install feedparser>=6.0.10 beautifulsoup4 dateparser 
          # 2. Force install pygooglenews ignoring its old dependencies
          pip install pygooglenews==0.1.2 --no-deps 
          # 3. Install the rest of your app's needs
          pip install -r requirements.txt

      - name: Run Dashboard Script
        env:
          # If you use a cloud LLM, put the API key here
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
        run: python news_dashboard_github.py --config config.yaml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ 
          # This line tells GitHub to ONLY keep the HTML and ignore the rest
          publish_assets: index.html
